<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis — Ealdforn Studios</title>
    <style>
        :root {
            --bg: #0a0e0f;
            --surface: #111618;
            --border: #1f2a2d;
            --text: #bcc8bc;
            --text-bright: #e0ece0;
            --accent: #7eb8a0;
            --accent-glow: #a0d8c0;
            --silver: #9aada0;
            --green: #5a9070;
            --muted: #5a6a5a;
            --font-body: 'Georgia', 'Times New Roman', serif;
            --font-mono: 'Courier New', 'SF Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(126,184,160,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(90,144,112,0.03) 0%, transparent 50%);
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header .icon { font-size: 28px; }
        .header .titles { display: flex; flex-direction: column; }
        .header .name {
            font-size: 18px;
            color: var(--accent-glow);
            letter-spacing: 1px;
            font-weight: bold;
        }
        .header .subtitle {
            font-size: 11px;
            color: var(--silver);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }
        .header .spacer { flex: 1; }
        .header .link {
            font-size: 11px;
            color: var(--muted);
            text-decoration: none;
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 3px;
            transition: all 0.2s;
        }
        .header .link:hover { border-color: var(--accent); color: var(--accent); }
        .header .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px rgba(126,184,160,0.5);
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.artemis { align-self: flex-start; }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message.user .avatar { background: var(--border); }
        .message.artemis .avatar {
            background: #1a2a24;
            border: 1px solid var(--green);
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
        }
        .message.user .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-bright);
        }
        .message.artemis .bubble {
            background: #111a16;
            border: 1px solid #1a3025;
            color: var(--text);
        }
        .bubble img {
            max-width: 280px;
            max-height: 280px;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid var(--border);
        }
        .bubble .memory-note {
            font-size: 11px;
            color: var(--silver);
            font-style: italic;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid var(--border);
        }
        .bubble .card-tag {
            font-size: 9px;
            color: var(--muted);
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            animation: typePulse 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typePulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.1); }
        }
        .input-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-bar textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 12px 16px;
            font-family: var(--font-body);
            font-size: 14px;
            border-radius: 8px;
            outline: none;
            resize: none;
            rows: 1;
            max-height: 120px;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        .input-bar textarea:focus { border-color: var(--accent); }
        .input-bar textarea::placeholder { color: #3a4a40; font-style: italic; }
        .input-bar button {
            background: var(--accent);
            border: none;
            color: var(--bg);
            padding: 12px 24px;
            font-family: var(--font-body);
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .input-bar button:hover {
            background: var(--accent-glow);
            box-shadow: 0 0 16px rgba(126,184,160,0.3);
        }
        .input-bar button:disabled {
            background: var(--border);
            color: var(--muted);
            cursor: not-allowed;
            box-shadow: none;
        }
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: var(--silver);
        }
        .welcome .big-icon { font-size: 48px; margin-bottom: 12px; }
        .welcome h2 {
            color: var(--accent-glow);
            font-size: 22px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .welcome p {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.7;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        @media (max-width: 600px) {
            .message { max-width: 95%; }
            .bubble { font-size: 14px; }
            .bubble img { max-width: 200px; max-height: 200px; }
            .input-bar { padding: 10px; }
            .input-bar button { padding: 10px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="icon">🏹</span>
        <div class="titles">
            <span class="name">Artemis</span>
            <span class="subtitle">Goddess of the Hunt · EaldfornAI</span>
        </div>
        <span class="spacer"></span>
        <span class="status-dot" id="statusDot" title="Agent Status"></span>
        <a href="terminal.html" class="link">◈ TERMINAL</a>
        <a href="../ealdforn-studios/index.html" class="link">◈ NEXUS</a>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcomeMsg">
            <div class="big-icon">🏹🌙</div>
            <h2>I am Artemis</h2>
            <p>Goddess of the Hunt. Keeper of the silver bow. I route your words through my deck of cards — memory, generation, retrieval — and return what you seek.</p>
            <p style="margin-top:12px;font-size:12px;color:var(--muted);">Speak plainly. I will find the right arrow.</p>
        </div>
    </div>

    <div class="chat-area" id="typingArea" style="display:none; padding:0 20px;">
        <div class="message artemis">
            <div class="avatar">🏹</div>
            <div class="bubble">
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            </div>
        </div>
    </div>

    <div class="input-bar">
        <textarea id="userInput" placeholder="Speak your query to Artemis..." rows="1"
            autocomplete="off" onkeydown="handleKeyDown(event)"></textarea>
        <button id="btnSend" onclick="sendMessage()">SEND</button>
    </div>

    <!-- SCRIPTS — Single source of truth load order -->
    <script src="cards/config.js"></script>
    <script src="cards/decisionLog.js"></script>
    <script src="cards/gaiaRecall.js"></script>
    <script src="cards/pollinationsText.js"></script>
    <script src="cards/pollinationsImage.js"></script>
    <script src="cards/browserHunt.js"></script>
    <script src="cards/compress.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="agent.js"></script>

    <script>
        let isProcessing = false;
        let messageCount = 0;
        let conversationHistory = [];

        async function boot() {
            console.log('[Artemis Chat] Booting...');
            const success = await ArtemisAgent.init();

            if (success) {
                const status = ArtemisAgent.getStatus();
                document.getElementById('statusDot').title =
                    'Online · ' + status.cardsLoaded + ' cards · ' + status.classifierMode;
                document.getElementById('statusDot').style.background = 'var(--accent)';
                console.log('[Artemis Chat] Ready.');
            } else {
                document.getElementById('statusDot').style.background = '#c06060';
                document.getElementById('statusDot').title = 'Init failed';
                addArtemisMessage('I am here, but my card engine did not rise properly. The hunt may be hindered.');
            }
            document.getElementById('userInput').focus();
        }

        async function sendMessage() {
            if (isProcessing) return;
            const inputEl = document.getElementById('userInput');
            const input = inputEl.value.trim();
            if (!input) return;

            inputEl.value = '';
            autoResize(inputEl);
            addUserMessage(input);
            conversationHistory.push({ role: 'user', content: input });

            if (messageCount === 0) {
                const w = document.getElementById('welcomeMsg');
                if (w) w.style.display = 'none';
            }

            showTyping(true);
            isProcessing = true;
            document.getElementById('btnSend').disabled = true;

            try {
                const startTime = performance.now();
                const result = await ArtemisAgent.processInput(input, {
                    conversationHistory: conversationHistory.slice(-10)
                });
                const elapsed = (performance.now() - startTime).toFixed(0);
                console.log('[Artemis Chat] ' + elapsed + 'ms — ' + (result.metadata?.cardsPlayed?.join(', ') || 'none'));

                let responseText = result.text || 'I loosed an arrow, but it found no target. Try again?';
                if (result.metadata?.cardsPlayed) {
                    responseText += '\n<!--CARDS:' + result.metadata.cardsPlayed.join(',') + '-->';
                }

                addArtemisMessage(responseText, result.imageUrl, result.metadata);
                conversationHistory.push({ role: 'assistant', content: result.text || '', imageUrl: result.imageUrl || null });
                messageCount++;

            } catch (err) {
                console.error('[Artemis Chat] Error:', err);
                addArtemisMessage('My arrow faltered. An error occurred. Please try again.');
            }

            showTyping(false);
            isProcessing = false;
            document.getElementById('btnSend').disabled = false;
            document.getElementById('userInput').focus();
        }

        function addUserMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message user';
            msg.innerHTML = '<div class="avatar">👤</div><div class="bubble">' + escapeHtml(text) + '</div>';
            document.getElementById('chatArea').appendChild(msg);
            scrollToBottom();
        }

        function addArtemisMessage(text, imageUrl, metadata) {
            const msg = document.createElement('div');
            msg.className = 'message artemis';

            let cardTagHtml = '';
            let cleanText = text;
            const cardMatch = text.match(/<!--CARDS:(.+?)-->/);
            if (cardMatch) {
                cleanText = text.replace(/<!--CARDS:.+?-->/, '').trim();
                cardTagHtml = '<div class="card-tag">🃏 ' + cardMatch[1].replace(/,/g, ' · ') + '</div>';
            }

            let formattedText = formatText(cleanText);
            let imageHtml = imageUrl
                ? '<img src="' + imageUrl + '" alt="Generated" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\';"><span style="display:none;color:var(--muted);font-size:11px;">[Image failed to load]</span>'
                : '';

            let memoryNoteHtml = '';
            if (formattedText.includes('*From memory:*')) {
                const parts = formattedText.split('*From memory:*');
                if (parts.length > 1) {
                    const memoryPart = parts[1].split('<br><br>')[0];
                    formattedText = parts[0].trim();
                    if (parts[1].includes('<br><br>')) {
                        formattedText += '<br><br>' + parts[1].substring(parts[1].indexOf('<br><br>') + 8).trim();
                    }
                    memoryNoteHtml = '<div class="memory-note">📜 ' + memoryPart.trim() + '</div>';
                }
            }

            msg.innerHTML = '<div class="avatar">🏹</div><div class="bubble">' +
                formattedText + imageHtml + memoryNoteHtml + cardTagHtml + '</div>';

            document.getElementById('chatArea').appendChild(msg);
            scrollToBottom();
        }

        function showTyping(show) {
            document.getElementById('typingArea').style.display = show ? 'block' : 'none';
            if (show) scrollToBottom();
        }

        function scrollToBottom() {
            const area = document.getElementById('chatArea');
            area.scrollTop = area.scrollHeight;
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function formatText(text) {
            if (!text) return '';
            text = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);">$1</a>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            text = text.replace(/&gt; (.*?)(<br>|$)/g, '<span style="color:var(--silver);font-style:italic;">$1</span>$2');
            return text;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
            setTimeout(() => autoResize(event.target), 0);
        }

        boot().catch(err => {
            console.error('[Artemis Chat] Boot failed:', err);
            document.getElementById('statusDot').style.background = '#c06060';
            const w = document.getElementById('welcomeMsg');
            if (w) w.innerHTML = '<div class="big-icon">🏹</div><h2>Artemis</h2><p style="color:#c06060;">The huntress could not rise. Check console.</p>';
        });
    </script>
</body>
</html>
