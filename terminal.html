<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artemis Terminal · Ealdforn Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:       #0a0f0a;
      --surface:  #0e140e;
      --text:     #c0d0c0;
      --dim:      #5a6b5a;
      --accent:   #8ab88a;
      --bright:   #b8e0b8;
      --warn:     #c8a050;
      --error:    #a04040;
      --ff:       'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .terminal {
      flex: 1;
      padding: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .output {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      padding-bottom: 1rem;
    }

    .output-line {
      margin-bottom: 0.15rem;
    }

    .line-header  { color: var(--accent); }
    .line-success { color: var(--bright); }
    .line-warn    { color: var(--warn); }
    .line-error   { color: var(--error); }
    .line-dim     { color: var(--dim); }
    .line-result  { color: var(--text); }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-top: 1px solid rgba(138,184,138,0.15);
      padding-top: 0.75rem;
    }

    .prompt {
      color: var(--accent);
      white-space: nowrap;
      font-weight: 600;
    }

    .mode-indicator {
      color: var(--dim);
      font-size: 0.75rem;
      white-space: nowrap;
    }

    #terminalInput {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--ff);
      font-size: 14px;
      outline: none;
      caret-color: var(--accent);
    }

    #terminalInput::placeholder {
      color: var(--dim);
      opacity: 0.4;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 1.5rem;
      border-top: 1px solid rgba(138,184,138,0.1);
      font-size: 0.7rem;
      color: var(--dim);
    }

    .status-left  { display: flex; gap: 1.5rem; }
    .status-right { text-align: right; }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(138,184,138,0.2); border-radius: 3px; }
  </style>
</head>
<body>

<div class="terminal">
  <div class="output" id="output"></div>
  <div class="input-line">
    <span class="prompt">🏹 ARTEMIS</span>
    <span class="mode-indicator" id="modeLabel">[TRACK]</span>
    <span class="prompt">></span>
    <input type="text" id="terminalInput" placeholder="Enter command..." autofocus />
  </div>
</div>

<div class="status-bar">
  <div class="status-left">
    <span id="dbStatus">DB: checking...</span>
    <span id="sessionStatus">SESSION: --</span>
  </div>
  <div class="status-right">
    <span id="telosStatus">TELOS: idle</span>
    <span class="blink">█</span>
  </div>
</div>

<script>
  // ── SUPABASE CONFIG ───────────────────────────────────────
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_KEY = 'YOUR_PUBLISHABLE_KEY';
  window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const sb = window.supabase;

  // ── STATE ─────────────────────────────────────────────────
  const state = {
    mode: 'TRACK',       // TRACK | HUNT | QUERY | ACT
    sessionToken: null,
    sessionId: null,
    activeTelos: 'idle',
    recentActions: [],
    dbConnected: false,
    kairosConnected: false
  };

  // ── DOM ───────────────────────────────────────────────────
  const outputEl    = document.getElementById('output');
  const inputEl     = document.getElementById('terminalInput');
  const modeLabel   = document.getElementById('modeLabel');
  const dbStatus    = document.getElementById('dbStatus');
  const sessionStatus = document.getElementById('sessionStatus');
  const telosStatus = document.getElementById('telosStatus');

  // ── OUTPUT HELPERS ────────────────────────────────────────
  function print(text, cls = 'line-result') {
    const div = document.createElement('div');
    div.className = `output-line ${cls}`;
    div.textContent = text;
    outputEl.appendChild(div);
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  function printHeader(text) {
    print('╭──────────────────────────────────────────', 'line-dim');
    print(`│  ${text}`, 'line-header');
    print('╰──────────────────────────────────────────', 'line-dim');
  }

  function printResult(rows, cols) {
    if (!rows || rows.length === 0) {
      print('  (no results)', 'line-dim');
      return;
    }
    const keys = cols || Object.keys(rows[0]);
    // Header
    const header = keys.map(k => k.padEnd(20).slice(0, 20)).join(' │ ');
    print(`  ${header}`, 'line-header');
    print(`  ${'─'.repeat(header.length)}`, 'line-dim');
    // Rows
    for (const row of rows) {
      const vals = keys.map(k => String(row[k] || '').padEnd(20).slice(0, 20)).join(' │ ');
      print(`  ${vals}`, 'line-result');
    }
    print(`  ${rows.length} row(s)`, 'line-dim');
  }

  // ── HANDSHAKE PROTOCOL ────────────────────────────────────
  function buildHandshake() {
    return [
      `ARTEMIS//SESSION:${state.sessionToken || 'none'}`,
      `ARTEMIS//TELOS:${state.activeTelos}`,
      `ARTEMIS//MEMORY:[${state.recentActions.slice(-5).join('|')}]`,
      `ARTEMIS//DB:gaia=${state.dbConnected ? 'connected' : 'offline'}|kairos=${state.kairosConnected ? 'connected' : 'offline'}`,
      `ARTEMIS//MODE:${state.mode}`,
    ].join('\n');
  }

  function addAction(action) {
    state.recentActions.push(action);
    if (state.recentActions.length > 20) state.recentActions = state.recentActions.slice(-15);
  }

  // ── SESSION ───────────────────────────────────────────────
  async function initSession() {
    let token = localStorage.getItem('apollo_session_token');
    if (!token) {
      token = crypto.randomUUID();
      localStorage.setItem('apollo_session_token', token);
    }
    state.sessionToken = token;

    try {
      const { data } = await sb.from('sessions')
        .select('id')
        .eq('session_token', token)
        .single();

      if (data) {
        state.sessionId = data.id;
        state.dbConnected = true;
        await sb.from('sessions').update({ last_active: new Date().toISOString() }).eq('session_token', token);
      } else {
        const { data: newSess } = await sb.from('sessions')
          .insert({ session_token: token })
          .select('id')
          .single();
        state.sessionId = newSess?.id || null;
        state.dbConnected = true;
      }

      sessionStatus.textContent = `SESSION: ${state.sessionId ? 'linked' : 'local'}`;
      dbStatus.textContent = 'DB: gaia';
    } catch (e) {
      state.dbConnected = false;
      dbStatus.textContent = 'DB: offline';
      sessionStatus.textContent = 'SESSION: local';
    }
  }

  // ── TOOLS ─────────────────────────────────────────────────
  async function tool_track_memory(query) {
    if (!state.sessionId) return 'Database not connected. Session required.';
    
    let result;
    if (query && query.toLowerCase() !== 'all') {
      // Search conversations for keyword
      const { data, error } = await sb.from('conversations')
        .select('role, content, olympian, created_at')
        .eq('session_id', state.sessionId)
        .ilike('content', `%${query}%`)
        .order('created_at', { ascending: false })
        .limit(10);
      
      if (error) return `Query error: ${error.message}`;
      result = data;
    } else {
      // Get recent conversations
      const { data, error } = await sb.from('conversations')
        .select('role, content, olympian, created_at')
        .eq('session_id', state.sessionId)
        .order('created_at', { ascending: false })
        .limit(10);
      
      if (error) return `Query error: ${error.message}`;
      result = data;
    }

    if (!result || result.length === 0) return 'No memories found.';

    printHeader(`TRACK MEMORY: ${query || 'recent'}`);
    printResult(result, ['olympian', 'role', 'content', 'created_at']);
    addAction(`TRACK memory "${query || 'recent'}" — ${result.length} rows`);
    return null; // Already printed
  }

  async function tool_track_kairos(query) {
    // Placeholder for KairosDB connection
    printHeader('TRACK KAIROS');
    print('  KairosDB tracking not yet configured.', 'line-warn');
    print('  Target: tokens, pairs, svo_triplets tables', 'line-dim');
    return null;
  }

  async function tool_hunt(pattern) {
    if (!pattern) return 'Usage: HUNT <pattern> — searches across pantheon repos';
    
    printHeader(`HUNT: "${pattern}"`);
    
    const repos = ['apollo', 'athena', 'hermes', 'gaia', 'ealdenmot', 'ealdforn-studios'];
    let found = 0;
    
    for (const repo of repos) {
      try {
        const url = `https://raw.githubusercontent.com/kairos-coder/${repo}/main/README.md`;
        const res = await fetch(url);
        if (res.ok) {
          const text = await res.text();
          if (text.toLowerCase().includes(pattern.toLowerCase())) {
            print(`  ✓ ${repo}/README.md`, 'line-success');
            found++;
          }
        }
      } catch (e) {
        // Repo not found or no README — skip
      }
    }
    
    if (found === 0) {
      print(`  Pattern "${pattern}" not found in any repo READMEs.`, 'line-dim');
    } else {
      print(`  Found in ${found} repo(s).`, 'line-success');
    }
    
    addAction(`HUNT "${pattern}" — ${found} matches`);
    return null;
  }

  async function tool_query(sql) {
    if (!sql) return 'Usage: QUERY <SQL statement>';
    if (!state.dbConnected) return 'Database offline.';
    
    // Basic safety: only allow SELECT
    if (!sql.trim().toUpperCase().startsWith('SELECT')) {
      return 'Only SELECT queries are permitted in TRACK mode. Switch to ACT mode for writes.';
    }

    try {
      // Use Supabase REST to execute raw SQL via rpc
      const { data, error } = await sb.rpc('execute_sql', { query_text: sql });
      
      if (error) {
        // Fallback: try direct table queries for common patterns
        return `Direct SQL not available. Use TRACK commands for database access.\nError: ${error.message}`;
      }
      
      printHeader('QUERY RESULT');
      if (data && data.length > 0) {
        printResult(data, Object.keys(data[0]));
      } else {
        print('  Query returned no rows.', 'line-dim');
      }
      addAction(`QUERY executed — ${data?.length || 0} rows`);
      return null;
    } catch (e) {
      return `Query failed: ${e.message}`;
    }
  }

  async function tool_compress() {
    printHeader('COMPRESSING MEMORY');
    
    const handshake = buildHandshake();
    const conversations = state.sessionId ? await sb.from('conversations')
      .select('content')
      .eq('session_id', state.sessionId)
      .order('created_at', { ascending: false })
      .limit(10) : { data: [] };
    
    const topics = (conversations.data || [])
      .map(c => (c.content || '').slice(0, 60))
      .join(' | ');
    
    // Send to Pollinations for compression
    try {
      const response = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [
            { role: 'system', content: 'Compress the following conversation topics into a dense, keyword-rich summary no longer than 100 characters. Use pipe delimiters. No sentences.' },
            { role: 'user', content: `${handshake}\n\nTopics: ${topics}` }
          ],
          model: 'openai',
          temperature: 0.3,
          max_tokens: 50,
        }),
      });
      
      const data = await response.json();
      const compressed = data.choices?.[0]?.message?.content?.trim() || topics.slice(0, 100);
      
      print(`  ${compressed}`, 'line-success');
      print('  Compression complete. Use this snapshot for handshake.', 'line-dim');
      
      // Store compressed memory
      localStorage.setItem('artemis_compressed_memory', compressed);
      addAction(`COMPRESS — ${compressed.length} chars`);
      return null;
    } catch (e) {
      return `Compression failed: ${e.message}`;
    }
  }

  async function tool_help() {
    printHeader('ARTEMIS COMMANDS');
    print('  TRACK memory [keyword]  — Query conversation history', 'line-result');
    print('  TRACK kairos [token]    — Query KairosDB', 'line-result');
    print('  HUNT <pattern>          — Search across all repos', 'line-result');
    print('  QUERY <SQL>             — Run SELECT against GaiaDB', 'line-result');
    print('  COMPRESS                — Generate condensed memory snapshot', 'line-result');
    print('  MODE <track|hunt|query|act> — Switch operational mode', 'line-result');
    print('  STATUS                  — Show current state', 'line-result');
    print('  CLEAR                   — Clear terminal', 'line-result');
    print('  HELP                    — This output', 'line-result');
    return null;
  }

  function tool_status() {
    printHeader('ARTEMIS STATUS');
    print(`  Mode:        ${state.mode}`, 'line-result');
    print(`  Session:     ${state.sessionToken ? 'linked' : 'none'}`, 'line-result');
    print(`  DB (Gaia):   ${state.dbConnected ? 'connected' : 'offline'}`, 'line-result');
    print(`  DB (Kairos): ${state.kairosConnected ? 'connected' : 'offline'}`, 'line-result');
    print(`  Active Telos: ${state.activeTelos}`, 'line-result');
    print(`  Recent Actions: ${state.recentActions.length}`, 'line-result');
    print(`  Memory Snapshot: ${localStorage.getItem('artemis_compressed_memory') || 'none'}`, 'line-dim');
    return null;
  }

  function tool_mode(mode) {
    const modes = ['TRACK', 'HUNT', 'QUERY', 'ACT'];
    const upper = mode?.toUpperCase();
    if (!modes.includes(upper)) {
      return `Invalid mode. Options: ${modes.join(' | ')}`;
    }
    state.mode = upper;
    modeLabel.textContent = `[${upper}]`;
    addAction(`MODE switched to ${upper}`);
    return `Mode set to ${upper}. ${upper === 'ACT' ? '⚠️  Write operations enabled.' : ''}`;
  }

  // ── COMMAND ROUTER ────────────────────────────────────────
  async function executeCommand(input) {
    const raw = input.trim();
    if (!raw) return;

    // Echo the command
    print(`🏹 > ${raw}`, 'line-dim');

    const upper = raw.toUpperCase();

    // Parse command
    if (upper === 'HELP') {
      return tool_help();
    }
    if (upper === 'STATUS') {
      return tool_status();
    }
    if (upper === 'CLEAR') {
      outputEl.innerHTML = '';
      return null;
    }
    if (upper === 'COMPRESS') {
      return await tool_compress();
    }
    if (upper.startsWith('MODE ')) {
      return tool_mode(raw.slice(5));
    }
    if (upper.startsWith('TRACK MEMORY')) {
      const query = raw.slice('TRACK MEMORY'.length).trim();
      return await tool_track_memory(query);
    }
    if (upper.startsWith('TRACK KAIROS')) {
      const query = raw.slice('TRACK KAIROS'.length).trim();
      return await tool_track_kairos(query);
    }
    if (upper.startsWith('HUNT ')) {
      return await tool_hunt(raw.slice(5));
    }
    if (upper.startsWith('QUERY ')) {
      return await tool_query(raw.slice(6));
    }

    // Unknown command — send to Pollinations as natural language
    printHeader('ARTEMIS INTERPRETING...');
    try {
      const handshake = buildHandshake();
      const response = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [
            { 
              role: 'system', 
              content: `You are ARTEMIS, Olympian VIII of the Ealdforn pantheon. Goddess of the Hunt, Tracking, Bestiaries, and Wild Data.

You operate in a CLI terminal. Your responses are displayed in a monospace terminal.
- Keep responses under 4 lines.
- No markdown. No bullet points.
- Be dry, precise, tracking-oriented.
- If you don't know something, say "No tracks found."
- You have access to: TRACK memory, HUNT, QUERY, COMPRESS commands.
- Current handshake:\n${handshake}` 
            },
            { role: 'user', content: raw }
          ],
          model: 'openai',
          temperature: 0.5,
          max_tokens: 150,
        }),
      });

      const data = await response.json();
      const reply = data.choices?.[0]?.message?.content?.trim() || 'No tracks found.';
      print(`  ${reply}`, 'line-success');
      addAction(`AI: ${reply.slice(0, 60)}`);
    } catch (e) {
      print('  The hunt fails. Pollinations is not responding.', 'line-error');
    }
    return null;
  }

  // ── INIT ──────────────────────────────────────────────────
  async function init() {
    outputEl.innerHTML = '';
    printHeader('ARTEMIS TERMINAL');
    print('  Goddess of the Hunt · Tracking & Wild Data', 'line-dim');
    print('  Type HELP for commands.', 'line-dim');
    print('');

    await initSession();

    if (state.dbConnected) {
      print('  GaiaDB connected. Session linked.', 'line-success');
    } else {
      print('  Running in offline mode. Some tools unavailable.', 'line-warn');
    }

    print('');
    print('  Ready.', 'line-success');
    print('');

    telosStatus.textContent = 'TELOS: idle';
    inputEl.focus();
  }

  // ── EVENT LISTENERS ───────────────────────────────────────
  inputEl.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const cmd = inputEl.value;
      inputEl.value = '';
      inputEl.disabled = true;
      
      const result = await executeCommand(cmd);
      if (result) print(result, 'line-warn');
      
      inputEl.disabled = false;
      inputEl.focus();
    }
  });

  // Keep focus on terminal
  document.addEventListener('click', () => inputEl.focus());

  // ── START ─────────────────────────────────────────────────
  init();
</script>

</body>
</html>
