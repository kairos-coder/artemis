<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis Terminal — Ealdforn Studios</title>
    <style>
        :root {
            --bg: #0a0e0f;
            --surface: #111618;
            --border: #1f2a2d;
            --text: #c0ccc0;
            --text-bright: #e0ece0;
            --accent: #7eb8a0;
            --accent-glow: #a0d8c0;
            --silver: #9aada0;
            --green: #5a9070;
            --warn: #c0a060;
            --error: #c06060;
            --card-meta: #6b7280;
            --card-memory: #a78bfa;
            --card-retrieval: #f59e0b;
            --card-generation: #60a5fa;
            --font-mono: 'Courier New', 'SF Mono', 'Fira Code', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header .icon { font-size: 22px; }
        .header .title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header .badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--border);
            color: var(--silver);
            letter-spacing: 0.5px;
        }
        .header .badge.online {
            background: #1a3020;
            color: var(--accent-glow);
            border: 1px solid var(--green);
        }
        .header .badge.learning {
            background: #1a2a30;
            color: #60a5fa;
            border: 1px solid #3a6a8a;
        }
        .header .spacer { flex: 1; }
        .header button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--silver);
            padding: 5px 12px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 11px;
            border-radius: 3px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .header button:hover { border-color: var(--accent); color: var(--accent-glow); }
        .header button.active {
            background: #1a2a24;
            border-color: var(--accent);
            color: var(--accent-glow);
        }
        .main { display: flex; flex: 1; overflow: hidden; }
        .output-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .output-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .output-area .line { margin-bottom: 2px; }
        .output-area .line.system { color: var(--card-meta); }
        .output-area .line.vote { color: var(--silver); }
        .output-area .line.exec { color: var(--accent); }
        .output-area .line.result { color: var(--text-bright); }
        .output-area .line.error { color: var(--error); }
        .output-area .line.warn { color: var(--warn); }
        .output-area .line.user { color: var(--accent-glow); }
        .output-area .separator { border-top: 1px dashed var(--border); margin: 8px 0; }
        .output-area img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin: 8px 0;
            display: block;
        }
        .side-panel {
            width: 340px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            font-size: 10px;
        }
        .side-section { padding: 12px; border-bottom: 1px solid var(--border); }
        .side-section h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--silver);
            margin-bottom: 8px;
        }
        .card-status { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 10px; }
        .card-status .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .card-status .dot.ready { background: var(--accent); }
        .card-status .dot.waiting { background: var(--card-meta); }
        .card-status .card-name { flex: 1; }
        .card-status .card-weight { color: var(--card-meta); font-size: 9px; }
        .stat-row { display: flex; justify-content: space-between; padding: 3px 0; }
        .stat-row .label { color: var(--card-meta); }
        .stat-row .value { color: var(--text-bright); }
        .input-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 12px;
            border-radius: 3px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-bar input:focus { border-color: var(--accent); }
        .input-bar input::placeholder { color: #3a4a40; }
        .input-bar button {
            background: var(--accent);
            border: none;
            color: var(--bg);
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .input-bar button:hover {
            background: var(--accent-glow);
            box-shadow: 0 0 12px rgba(126,184,160,0.3);
        }
        .input-bar button:disabled {
            background: var(--border);
            color: var(--card-meta);
            cursor: not-allowed;
            box-shadow: none;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulsing { animation: pulse 1.5s infinite; }
        @media (max-width: 768px) { .side-panel { display: none; } }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <span class="icon">🏹</span>
        <span class="title">Artemis Terminal</span>
        <span class="badge online" id="statusBadge">● ONLINE</span>
        <span class="badge learning" id="learningBadge" style="display:none;">◆ LEARNING</span>
        <span class="spacer"></span>
        <button id="btnAuto" class="active" onclick="setMode('AUTO')">AUTO</button>
        <button id="btnManual" onclick="setMode('MANUAL')">MANUAL</button>
        <button onclick="showHelp()">HELP</button>
        <button onclick="clearTerminal()">CLEAR</button>
        <button onclick="showStatus()">STATUS</button>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="output-panel">
            <div class="output-area" id="output"></div>
        </div>
        <div class="side-panel" id="sidePanel">
            <div class="side-section">
                <h3>🃏 Card Deck</h3>
                <div id="cardList"></div>
            </div>
            <div class="side-section">
                <h3>📊 System</h3>
                <div id="sysStats"></div>
            </div>
            <div class="side-section">
                <h3>📋 Last Vote</h3>
                <div id="lastVote" style="color:var(--card-meta);">No votes yet.</div>
            </div>
            <div class="side-section">
                <h3>⚡ Recent</h3>
                <div id="recentActions" style="color:var(--card-meta); max-height:200px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <!-- INPUT -->
    <div class="input-bar">
        <span style="color:var(--accent);font-weight:bold;">⟩</span>
        <input type="text" id="userInput" placeholder="Speak to Artemis..." autocomplete="off"
            onkeydown="if(event.key==='Enter')sendCommand()">
        <button id="btnSend" onclick="sendCommand()">SEND</button>
    </div>

    <!-- SCRIPTS — Single source of truth load order -->
    <script src="cards/config.js"></script>
    <script src="cards/decisionLog.js"></script>
    <script src="cards/gaiaRecall.js"></script>
    <script src="cards/pollinationsText.js"></script>
    <script src="cards/pollinationsImage.js"></script>
    <script src="cards/browserHunt.js"></script>
    <script src="cards/compress.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="agent.js"></script>

    <script>
        let currentMode = 'AUTO';
        let isProcessing = false;
        let commandHistory = [];
        let historyIndex = -1;
        let lastVotedCards = [];

        // === BOOT ===
        async function boot() {
            printSystem('╔══════════════════════════════════════════╗');
            printSystem('║   ARTEMIS TERMINAL — EaldfornAI v2.1    ║');
            printSystem('║   Card Router Engine — Heuristic        ║');
            printSystem('║   Monastery Phase-Lock: ACTIVE          ║');
            printSystem('╚══════════════════════════════════════════╝');
            printSystem('');
            printSystem('Initializing Artemis Agent...');

            const success = await ArtemisAgent.init();

            if (success) {
                const status = ArtemisAgent.getStatus();
                printSystem('✓ Initialized — ' + status.cardsLoaded + ' cards loaded');
                printSystem('  Session: ' + (status.sessionId || '').substring(0, 16) + '...');
                printSystem('  Classifier: ' + status.classifierMode);
                printSystem('  Supabase: ' + (status.supabaseConnected ? 'connected' : 'offline'));
                document.getElementById('statusBadge').textContent = '● ONLINE';
                document.getElementById('statusBadge').className = 'badge online';
                updateSidePanel();
            } else {
                printSystem('✗ Initialization failed. Check console.');
                document.getElementById('statusBadge').textContent = '● OFFLINE';
                document.getElementById('statusBadge').className = 'badge';
            }

            printSystem('──────────────────────────────────────────');
            printSystem('Type HELP for commands. Anything else routes through the card engine.');
            document.getElementById('userInput').focus();
        }

        // === SEND COMMAND ===
        async function sendCommand() {
            if (isProcessing) return;
            const inputEl = document.getElementById('userInput');
            const input = inputEl.value.trim();
            if (!input) return;

            commandHistory.push(input);
            historyIndex = commandHistory.length;
            inputEl.value = '';

            printUser(input);

            if (handleTerminalCommand(input)) return;

            isProcessing = true;
            document.getElementById('btnSend').disabled = true;
            document.getElementById('btnSend').textContent = '...';

            if (currentMode === 'MANUAL') {
                printSystem('[MANUAL] Routing through card engine...');
            }

            try {
                const startTime = performance.now();
                const result = await ArtemisAgent.processInput(input);
                const elapsed = (performance.now() - startTime).toFixed(0);

                if (result.metadata && result.metadata.cardsPlayed) {
                    lastVotedCards = result.metadata.cardsPlayed;
                    printSystem('✓ Cards played: ' + result.metadata.cardsPlayed.join(', ') + ' (' + elapsed + 'ms)');
                }

                printSeparator();
                if (result.text) printResult(result.text);
                if (result.imageUrl) printImage(result.imageUrl);
                printSeparator();

            } catch (err) {
                printError('Engine error: ' + err.message);
                console.error(err);
            }

            isProcessing = false;
            document.getElementById('btnSend').disabled = false;
            document.getElementById('btnSend').textContent = 'SEND';
            updateSidePanel();
            scrollToBottom();
        }

        function handleTerminalCommand(input) {
            const upper = input.toUpperCase().trim();
            switch (upper) {
                case 'HELP': showHelp(); return true;
                case 'STATUS': showStatus(); return true;
                case 'CARDS': showCards(); return true;
                case 'WEIGHTS': showWeights(); return true;
                case 'HISTORY': showHistory(); return true;
                case 'CLEAR': clearTerminal(); return true;
                default: return false;
            }
        }

        // === COMMANDS ===
        function showHelp() {
            printSystem('');
            printSystem('┌─── COMMANDS ────────────────────────────┐');
            printSystem('│  HELP     — This message                │');
            printSystem('│  STATUS   — System status               │');
            printSystem('│  CARDS    — List all cards              │');
            printSystem('│  WEIGHTS  — Learned card weights        │');
            printSystem('│  HISTORY  — Recent decisions            │');
            printSystem('│  CLEAR    — Clear terminal              │');
            printSystem('│  AUTO     — Auto-execute mode           │');
            printSystem('│  MANUAL   — Manual approval mode        │');
            printSystem('└──────────────────────────────────────────┘');
            printSystem('');
        }

        function showStatus() {
            const s = ArtemisAgent.getStatus();
            printSystem('');
            printSystem('┌─── SYSTEM STATUS ───────────────────────┐');
            printSystem('│  Initialized:  ' + String(s.initialized).padEnd(27) + '│');
            printSystem('│  Cards Loaded: ' + String(s.cardsLoaded).padEnd(27) + '│');
            printSystem('│  Decisions:    ' + String(s.decisionCount).padEnd(27) + '│');
            printSystem('│  Session:      ' + (s.sessionId||'').substring(0,20).padEnd(27) + '│');
            printSystem('│  Classifier:   ' + s.classifierMode.padEnd(27) + '│');
            printSystem('│  Supabase:     ' + (s.supabaseConnected?'connected':'offline').padEnd(27) + '│');
            printSystem('│  Mode:         ' + currentMode.padEnd(27) + '│');
            printSystem('└──────────────────────────────────────────┘');
            printSystem('');
        }

        function showCards() {
            const cards = ArtemisAgent.getCardRegistry();
            printSystem('');
            printSystem('┌─── CARD DECK ───────────────────────────┐');
            cards.forEach(c => {
                const icon = c.icon || '🃏';
                const name = c.name.padEnd(22);
                const cat = (c.category||'—').padEnd(12);
                const w = (c.weight||0).toFixed(2);
                printSystem('│ ' + icon + ' ' + name + ' ' + cat + ' w:' + w + ' │');
            });
            printSystem('└──────────────────────────────────────────┘');
            printSystem('');
        }

        function showWeights() {
            const cards = ArtemisAgent.getCardRegistry();
            printSystem('');
            printSystem('┌─── LEARNED WEIGHTS ─────────────────────┐');
            cards.forEach(c => {
                const name = c.name.padEnd(22);
                const plays = String(c.playCount||0).padStart(4);
                const succ = String(c.successCount||0).padStart(4);
                const w = (c.weight||0).toFixed(3);
                printSystem('│ ' + name + ' plays:' + plays + ' ✓:' + succ + ' w:' + w + ' │');
            });
            printSystem('└──────────────────────────────────────────┘');
            printSystem('');
        }

        function showHistory() {
            try {
                const hist = JSON.parse(localStorage.getItem('artemis_recent_actions') || '[]');
                printSystem('');
                printSystem('┌─── RECENT ACTIONS ──────────────────────┐');
                if (hist.length === 0) {
                    printSystem('│  No actions recorded.                   │');
                } else {
                    hist.slice(-10).forEach(a => {
                        const time = new Date(a.timestamp).toLocaleTimeString();
                        const inp = (a.input||'').substring(0,35).padEnd(35);
                        printSystem('│ ' + time + ' ' + inp + ' │');
                    });
                }
                printSystem('└──────────────────────────────────────────┘');
                printSystem('');
            } catch (e) { printError('Failed: ' + e.message); }
        }

        function clearTerminal() {
            document.getElementById('output').innerHTML = '';
            printSystem('Terminal cleared. Artemis awaits.');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnAuto').className = mode === 'AUTO' ? 'active' : '';
            document.getElementById('btnManual').className = mode === 'MANUAL' ? 'active' : '';
            printSystem('[MODE] ' + mode);
        }

        // === OUTPUT HELPERS ===
        function printSystem(t) { appendLine(t, 'system'); }
        function printUser(t) { appendLine('⟩ ' + t, 'user'); }
        function printResult(t) { t.split('\n').forEach(l => appendLine(l, 'result')); }
        function printError(t) { appendLine('[ERR] ' + t, 'error'); }
        function printSeparator() { appendLine('──────────────────────────────────────────', 'system'); }

        function printImage(url) {
            const out = document.getElementById('output');
            const img = document.createElement('img');
            img.src = url;
            img.alt = 'Generated';
            img.onerror = () => {
                const err = document.createElement('div');
                err.className = 'line error';
                err.textContent = '[IMG] Failed to load';
                out.appendChild(err);
            };
            out.appendChild(img);
            appendLine('[IMG] ' + url.substring(0,80) + '...', 'system');
        }

        function appendLine(text, cls) {
            const out = document.getElementById('output');
            const div = document.createElement('div');
            div.className = 'line ' + (cls||'');
            div.textContent = text;
            out.appendChild(div);
        }

        function scrollToBottom() {
            const out = document.getElementById('output');
            out.scrollTop = out.scrollHeight;
        }

        // === SIDE PANEL ===
        function updateSidePanel() {
            const status = ArtemisAgent.getStatus();
            const cards = ArtemisAgent.getCardRegistry();

            document.getElementById('cardList').innerHTML = cards.map(c => {
                const dotClass = (c.weight||0) > 0.3 ? 'ready' : 'waiting';
                const catColors = { meta:'var(--card-meta)', memory:'var(--card-memory)', retrieval:'var(--card-retrieval)', generation:'var(--card-generation)' };
                const color = catColors[c.category] || 'var(--card-meta)';
                return `<div class="card-status">
                    <span class="dot ${dotClass}" style="background:${color};"></span>
                    <span class="card-name">${c.icon||''} ${c.name}</span>
                    <span class="card-weight">${(c.weight||0).toFixed(2)}</span>
                </div>`;
            }).join('');

            document.getElementById('sysStats').innerHTML = `
                <div class="stat-row"><span class="label">Decisions</span><span class="value">${status.decisionCount}</span></div>
                <div class="stat-row"><span class="label">Session</span><span class="value">${(status.sessionId||'').substring(0,12)}...</span></div>
                <div class="stat-row"><span class="label">Classifier</span><span class="value">${status.classifierMode}</span></div>
                <div class="stat-row"><span class="label">Supabase</span><span class="value">${status.supabaseConnected?'✓':'✗'}</span></div>
            `;

            document.getElementById('lastVote').textContent = lastVotedCards.length > 0
                ? lastVotedCards.join(', ')
                : 'No votes yet.';

            try {
                const hist = JSON.parse(localStorage.getItem('artemis_recent_actions') || '[]');
                document.getElementById('recentActions').innerHTML = hist.length === 0
                    ? '<span style="color:var(--card-meta);">No actions yet.</span>'
                    : hist.slice(-8).reverse().map(a => {
                        const time = new Date(a.timestamp).toLocaleTimeString();
                        return `<div style="margin-bottom:4px;"><span style="color:var(--card-meta);">${time}</span> ${(a.input||'').substring(0,40)}</div>`;
                    }).join('');
            } catch(e) {}
        }

        // === KEYBOARD ===
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp' && document.activeElement === document.getElementById('userInput')) {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    document.getElementById('userInput').value = commandHistory[historyIndex] || '';
                }
            }
            if (e.key === 'ArrowDown' && document.activeElement === document.getElementById('userInput')) {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    document.getElementById('userInput').value = commandHistory[historyIndex] || '';
                } else {
                    historyIndex = commandHistory.length;
                    document.getElementById('userInput').value = '';
                }
            }
        });

        boot().catch(err => {
            printError('Boot failed: ' + err.message);
            console.error(err);
        });
    </script>
</body>
</html>
