<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artemis Terminal · Ealdforn Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:       #0a0f0a;
      --surface:  #0e140e;
      --text:     #c0d0c0;
      --dim:      #5a6b5a;
      --accent:   #8ab88a;
      --bright:   #b8e0b8;
      --warn:     #c8a050;
      --error:    #a04040;
      --ff:       'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .terminal {
      flex: 1;
      padding: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .output {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      padding-bottom: 1rem;
    }

    .output-line { margin-bottom: 0.15rem; }
    .line-header  { color: var(--accent); }
    .line-success { color: var(--bright); }
    .line-warn    { color: var(--warn); }
    .line-error   { color: var(--error); }
    .line-dim     { color: var(--dim); }
    .line-result  { color: var(--text); }
    .line-vote-yes { color: var(--bright); }
    .line-vote-no  { color: var(--dim); }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-top: 1px solid rgba(138,184,138,0.15);
      padding-top: 0.75rem;
    }

    .prompt { color: var(--accent); white-space: nowrap; font-weight: 600; }
    .mode-indicator { color: var(--dim); font-size: 0.75rem; white-space: nowrap; }

    #terminalInput {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--ff);
      font-size: 14px;
      outline: none;
      caret-color: var(--accent);
    }

    #terminalInput::placeholder { color: var(--dim); opacity: 0.4; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 1.5rem;
      border-top: 1px solid rgba(138,184,138,0.1);
      font-size: 0.7rem;
      color: var(--dim);
    }

    .status-left  { display: flex; gap: 1.5rem; }
    .status-right { text-align: right; }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(138,184,138,0.2); border-radius: 3px; }
  </style>
</head>
<body>

<div class="terminal">
  <div class="output" id="output"></div>
  <div class="input-line">
    <span class="prompt">🏹 ARTEMIS</span>
    <span class="mode-indicator" id="modeLabel">[AUTO]</span>
    <span class="prompt">></span>
    <input type="text" id="terminalInput" placeholder="Enter command or natural language..." autofocus />
  </div>
</div>

<div class="status-bar">
  <div class="status-left">
    <span id="dbStatus">DB: checking...</span>
    <span id="sessionStatus">SESSION: --</span>
    <span id="agentStatus">AGENT: loading...</span>
  </div>
  <div class="status-right">
    <span id="telosStatus">TELOS: idle</span>
    <span class="blink">█</span>
  </div>
</div>

<script src="agent.js"></script>
<script>
  // ── SUPABASE CONFIG ───────────────────────────────────────
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_KEY = 'YOUR_PUBLISHABLE_KEY';
  window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const sb = window.supabase;

  // ── STATE ─────────────────────────────────────────────────
  const state = {
    mode: 'AUTO',  // AUTO | MANUAL | TRACK | HUNT | QUERY | ACT
    sessionToken: null,
    sessionId: null,
    dbConnected: false,
    agentReady: false,
    classifierLoaded: false
  };

  // ── DOM ───────────────────────────────────────────────────
  const outputEl      = document.getElementById('output');
  const inputEl       = document.getElementById('terminalInput');
  const modeLabel     = document.getElementById('modeLabel');
  const dbStatus      = document.getElementById('dbStatus');
  const sessionStatus = document.getElementById('sessionStatus');
  const agentStatus   = document.getElementById('agentStatus');
  const telosStatus   = document.getElementById('telosStatus');

  // ── OUTPUT HELPERS ────────────────────────────────────────
  function print(text, cls = 'line-result') {
    const div = document.createElement('div');
    div.className = `output-line ${cls}`;
    div.textContent = text;
    outputEl.appendChild(div);
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  function printHeader(text) {
    print('╭──────────────────────────────────────────', 'line-dim');
    print(`│  ${text}`, 'line-header');
    print('╰──────────────────────────────────────────', 'line-dim');
  }

  function printResult(rows, cols) {
    if (!rows || rows.length === 0) {
      print('  (no results)', 'line-dim');
      return;
    }
    const keys = cols || Object.keys(rows[0]);
    const header = keys.map(k => String(k).padEnd(20).slice(0, 20)).join(' │ ');
    print(`  ${header}`, 'line-header');
    print(`  ${'─'.repeat(header.length)}`, 'line-dim');
    for (const row of rows) {
      const vals = keys.map(k => String(row[k] || '').padEnd(20).slice(0, 20)).join(' │ ');
      print(`  ${vals}`, 'line-result');
    }
    print(`  ${rows.length} row(s)`, 'line-dim');
  }

  // ── SESSION ───────────────────────────────────────────────
  async function initSession() {
    let token = localStorage.getItem('apollo_session_token');
    if (!token) {
      token = crypto.randomUUID();
      localStorage.setItem('apollo_session_token', token);
    }
    state.sessionToken = token;

    try {
      const { data } = await sb.from('sessions')
        .select('id')
        .eq('session_token', token)
        .single();

      if (data) {
        state.sessionId = data.id;
        state.dbConnected = true;
        await sb.from('sessions').update({ last_active: new Date().toISOString() }).eq('session_token', token);
      } else {
        const { data: newSess } = await sb.from('sessions')
          .insert({ session_token: token })
          .select('id')
          .single();
        state.sessionId = newSess?.id || null;
        state.dbConnected = true;
      }

      sessionStatus.textContent = `SESSION: ${state.sessionId ? 'linked' : 'local'}`;
      dbStatus.textContent = 'DB: gaia';
    } catch (e) {
      state.dbConnected = false;
      dbStatus.textContent = 'DB: offline';
      sessionStatus.textContent = 'SESSION: local';
    }
  }

  // ── AGENT INIT ────────────────────────────────────────────
  async function initAgent() {
    agentStatus.textContent = 'AGENT: loading...';
    
    try {
      await window.ArtemisAgent.loadClassifier();
      state.classifierLoaded = true;
      state.agentReady = true;
      agentStatus.textContent = 'AGENT: ready (ML)';
    } catch (e) {
      state.agentReady = true;
      agentStatus.textContent = 'AGENT: ready (heuristic)';
    }
  }

  // ── COMMAND EXECUTION ─────────────────────────────────────
  async function executeCommand(input) {
    const raw = input.trim();
    if (!raw) return;

    print(`🏹 > ${raw}`, 'line-dim');
    const upper = raw.toUpperCase();

    // ── BUILT-IN COMMANDS ────────────────────────────────────
    if (upper === 'HELP') {
      printHeader('ARTEMIS COMMANDS');
      print('  AUTO mode (default):', 'line-header');
      print('    Any natural language → Artemis classifies and executes matching tools', 'line-result');
      print('  MANUAL commands:', 'line-header');
      print('    TRACK memory [keyword]  — Search conversations', 'line-result');
      print('    HUNT <pattern>          — Search across repos', 'line-result');
      print('    COMPRESS                — Generate memory snapshot', 'line-result');
      print('    STATUS                  — Show current state', 'line-result');
      print('    MODE <auto|manual>      — Switch mode', 'line-result');
      print('    CLEAR                   — Clear terminal', 'line-result');
      print('    CARDS                   — List all tool cards', 'line-result');
      print('    HELP                    — This output', 'line-result');
      return;
    }

    if (upper === 'STATUS') {
      printHeader('ARTEMIS STATUS');
      print(`  Mode:        ${state.mode}`, 'line-result');
      print(`  Session:     ${state.sessionToken ? 'linked' : 'none'}`, 'line-result');
      print(`  DB (Gaia):   ${state.dbConnected ? 'connected' : 'offline'}`, 'line-result');
      print(`  Agent:       ${state.classifierLoaded ? 'ML model' : 'heuristic'}`, 'line-result');
      print(`  Memory:      ${localStorage.getItem('artemis_compressed_memory') || 'none'}`, 'line-dim');
      return;
    }

    if (upper === 'CLEAR') {
      outputEl.innerHTML = '';
      return;
    }

    if (upper === 'CARDS') {
      printHeader('TOOL CARDS');
      for (const card of window.ArtemisAgent.TOOL_CARDS) {
        print(`  ${card.icon} ${card.name}: ${card.description}`, 'line-result');
      }
      return;
    }

    if (upper.startsWith('MODE ')) {
      const mode = raw.slice(5).toUpperCase();
      if (mode === 'AUTO' || mode === 'MANUAL') {
        state.mode = mode;
        modeLabel.textContent = `[${mode}]`;
        print(`  Mode set to ${mode}.`, 'line-success');
      } else {
        print('  Invalid mode. Use AUTO or MANUAL.', 'line-warn');
      }
      return;
    }

    // ── MANUAL MODE COMMANDS ─────────────────────────────────
    if (state.mode === 'MANUAL') {
      if (upper.startsWith('TRACK MEMORY')) {
        const query = raw.slice('TRACK MEMORY'.length).trim();
        printHeader(`TRACK MEMORY: ${query || 'recent'}`);
        const result = await window.ArtemisAgent.tools.trackMemory(query);
        if (result.error) {
          print(`  ${result.error}`, 'line-error');
        } else if (result.text) {
          print(`  ${result.text}`, 'line-success');
        }
        if (result.data) printResult(result.data, ['olympian', 'role', 'content']);
        return;
      }

      if (upper.startsWith('HUNT ')) {
        const pattern = raw.slice(5);
        printHeader(`HUNT: "${pattern}"`);
        const result = await window.ArtemisAgent.tools.hunt(pattern);
        if (result.error) {
          print(`  ${result.error}`, 'line-error');
        } else {
          print(`  ${result.text}`, 'line-success');
        }
        return;
      }

      if (upper === 'COMPRESS') {
        printHeader('COMPRESSING MEMORY');
        const result = await window.ArtemisAgent.tools.compress();
        if (result.text) print(`  ${result.text}`, 'line-success');
        return;
      }

      print('  Unknown manual command. Type HELP.', 'line-warn');
      return;
    }

    // ── AUTO MODE — Run the card engine ──────────────────────
    if (state.mode === 'AUTO') {
      printHeader('ARTEMIS PROCESSING...');
      print('  Classifying against tool cards...', 'line-dim');
      
      const result = await window.ArtemisAgent.process(raw, {
        verbose: true,
        autoCompress: false,
        sessionId: state.sessionId
      });

      // Show card votes
      print('');
      for (const vote of result.cardVotes) {
        const icon = window.ArtemisAgent.TOOL_CARDS.find(c => c.name === vote.card)?.icon || '•';
        const pct = Math.round(vote.score * 100);
        if (vote.match) {
          print(`  ${icon} ${vote.card}: YES (${pct}%)`, 'line-vote-yes');
        } else {
          const reason = vote.reason ? ` — ${vote.reason}` : '';
          print(`  ${icon} ${vote.card}: NO (${pct}%)${reason}`, 'line-vote-no');
        }
      }

      // Show results
      print('');
      if (result.results.length === 0) {
        print('  No tools matched. Try rephrasing.', 'line-warn');
      } else {
        for (const r of result.results) {
          printHeader(`${r.icon} ${r.card}`);
          if (r.output.error) {
            print(`  Error: ${r.output.error}`, 'line-error');
          } else if (r.output.text) {
            print(`  ${r.output.text}`, 'line-success');
          }
          if (r.output.data) {
            printResult(r.output.data, ['olympian', 'role', 'content']);
          }
          if (r.output.matches) {
            print(`  Matches: ${r.output.matches.join(', ')}`, 'line-success');
          }
        }
      }

      // Auto-compress after processing
      print('');
      print('  Auto-compressing memory...', 'line-dim');
      const compressResult = await window.ArtemisAgent.tools.compress();
      if (compressResult.text) {
        print(`  ${compressResult.text}`, 'line-dim');
      }
      
      return;
    }
  }

  // ── INIT ──────────────────────────────────────────────────
  async function init() {
    outputEl.innerHTML = '';
    printHeader('ARTEMIS TERMINAL');
    print('  EaldfornAI · Personal Agent · Card Engine', 'line-dim');
    print('  Type HELP for commands. Default mode: AUTO', 'line-dim');
    print('');

    await initSession();
    await initAgent();

    if (state.dbConnected) {
      print('  GaiaDB connected. Session linked.', 'line-success');
    } else {
      print('  Running in offline mode.', 'line-warn');
    }

    print(`  Agent: ${state.classifierLoaded ? 'ML classifier ready' : 'Heuristic mode'}`, 'line-success');
    print('');
    print('  Ready. Speak naturally or use MANUAL commands.', 'line-success');
    print('');

    telosStatus.textContent = 'TELOS: idle';
    inputEl.focus();
  }

  // ── EVENT LISTENERS ───────────────────────────────────────
  inputEl.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const cmd = inputEl.value;
      inputEl.value = '';
      inputEl.disabled = true;
      
      await executeCommand(cmd);
      
      inputEl.disabled = false;
      inputEl.focus();
    }
  });

  document.addEventListener('click', () => inputEl.focus());

  // ── START ─────────────────────────────────────────────────
  init();
</script>

</body>
</html>
